<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Text Extractor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1rem;
      color: #1a1a1a;
      background: #fafafa;
    }

    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }

    .dropzone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 3rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .dropzone.over {
      border-color: #2563eb;
      background: #eff6ff;
    }
    .dropzone p { color: #666; }
    .dropzone input { display: none; }

    .status {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #e5e7eb;
      display: none;
    }
    .status.visible { display: block; }
    .status .label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 0.25rem;
    }
    .status .state {
      font-weight: 600;
      text-transform: capitalize;
    }
    .status .state.done { color: #16a34a; }
    .status .state.failed { color: #dc2626; }
    .status .state.processing, .status .state.queued { color: #ca8a04; }

    .result {
      margin-top: 1rem;
      display: none;
    }
    .result.visible { display: block; }
    .result pre {
      background: #f3f4f6;
      padding: 1rem;
      border-radius: 6px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 60vh;
      overflow-y: auto;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .error {
      margin-top: 0.5rem;
      color: #dc2626;
      font-size: 0.9rem;
    }

    .page-divider {
      margin: 1rem 0;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid #d1d5db;
      font-weight: 600;
      font-size: 0.8rem;
      color: #888;
    }

    .copy-btn {
      margin-bottom: 0.5rem;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      background: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #f3f4f6; }
    .copy-btn.copied {
      background: #dcfce7;
      border-color: #86efac;
    }
  </style>
</head>
<body>
  <h1>PDF Text Extractor</h1>

  <div class="dropzone" id="dropzone">
    <p>Drop a PDF here or click to upload</p>
    <input type="file" accept=".pdf" id="fileInput">
  </div>

  <div class="status" id="status">
    <div class="label">Status</div>
    <div class="state" id="state"></div>
    <div class="error" id="error"></div>
    <div class="result" id="result">
      <button class="copy-btn" id="copyBtn">Copy text</button>
      <pre id="output"></pre>
    </div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const statusEl = document.getElementById('status');
    const stateEl = document.getElementById('state');
    const errorEl = document.getElementById('error');
    const resultEl = document.getElementById('result');
    const outputEl = document.getElementById('output');
    const copyBtn = document.getElementById('copyBtn');

    copyBtn.addEventListener('click', async () => {
      await navigator.clipboard.writeText(outputEl.textContent);
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'Copy text';
        copyBtn.classList.remove('copied');
      }, 2000);
    });

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('over');
      const file = e.dataTransfer.files[0];
      if (file) upload(file);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) upload(fileInput.files[0]);
    });

    async function upload(file) {
      statusEl.classList.add('visible');
      resultEl.classList.remove('visible');
      errorEl.textContent = '';
      stateEl.textContent = 'Uploading...';
      stateEl.className = 'state';

      const form = new FormData();
      form.append('file', file);

      try {
        const res = await fetch('/jobs', { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok) {
          stateEl.textContent = 'Error';
          stateEl.className = 'state failed';
          errorEl.textContent = data.error;
          return;
        }

        poll(data.jobId);
      } catch (err) {
        stateEl.textContent = 'Error';
        stateEl.className = 'state failed';
        errorEl.textContent = err.message;
      }
    }

    async function poll(jobId) {
      stateEl.textContent = 'Queued';
      stateEl.className = 'state queued';

      const interval = setInterval(async () => {
        try {
          const res = await fetch(`/jobs/${jobId}`);
          const data = await res.json();

          stateEl.textContent = data.status;
          stateEl.className = `state ${data.status}`;

          if (data.status === 'done') {
            clearInterval(interval);
            resultEl.classList.add('visible');
            outputEl.innerHTML = '';
            for (const page of data.result.pages) {
              const div = document.createElement('div');
              div.className = 'page-divider';
              div.textContent = `Page ${page.page}`;
              outputEl.appendChild(div);
              outputEl.appendChild(document.createTextNode(page.text));
            }
          } else if (data.status === 'failed') {
            clearInterval(interval);
            errorEl.textContent = data.error;
          }
        } catch {
          // keep polling
        }
      }, 1000);
    }
  </script>
</body>
</html>
